name: Daily Blog Post

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC daily
  workflow_dispatch:      # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        run: |
          git config user.name "FSA Blog Bot"
          git config user.email "blog@fivestarassistants.com"
          git add data/blogPosts.json public/sitemap.xml
          git diff --staged --quiet || git commit -m "chore: auto-publish blog post $(date +%Y-%m-%d) [skip ci]"
          git push
